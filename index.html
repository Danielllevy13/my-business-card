<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card | Daniel Levi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="card-container">
        <div class="card">
            <div class="logo-container">
                <img src="logo.png" alt="Logo" class="logo">
            </div>
            <div class="profile-header">
                <div class="profile-image-container">
                    <!-- תמונת הפרופיל תיכנס כאן -->
                    <img src="profile.jpg.jpeg" alt="Daniel Levi" id="profile-img">
                </div>
                <h1>Daniel Levi</h1>
                <p class="tagline">Account Executive & Sales | COLUGO</p>
            </div>
            
            <div class="contact-methods">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <span>Danilev@Colugo-sys.com</span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span>+972 50 691 3132</span>
                </div>
            </div>
            
            <div class="card-body">
                <div class="social-links">
                    <a href="https://www.linkedin.com/in/daniel-levi-887a32226" target="_blank" class="btn primary">
                        <i class="fab fa-linkedin"></i> LinkedIn
                    </a>
                    <a href="https://wa.me/972506913132" target="_blank" class="btn whatsapp">
                        <i class="fab fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="mailto:Danilev@Colugo-sys.com" class="btn email">
                        <i class="fas fa-paper-plane"></i> Email
                    </a>
                </div>
            </div>

            <div class="card-footer">
                <p><a href="https://colugo-sys.com" target="_blank" class="footer-link">colugo-sys.com</a></p>
            </div>
        </div>
    </div>
</body>
</html>
